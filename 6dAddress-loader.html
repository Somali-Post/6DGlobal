<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>6D Address Loader Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;650;750;850&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #08111f;
      --muted: #637184;
      --panel: rgba(255, 255, 255, 0.88);
      --line: rgba(9, 47, 92, 0.1);
      --blue: #0b68c7;
      --blue-soft: #dcecff;
      --red: #d93636;
      --green: #1f9d61;
      --shadow: rgba(9, 32, 64, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-width: 0;
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      font-family: "Inter", "Arial Rounded MT Bold", "Arial", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 50% 38%, rgba(11, 104, 199, 0.11), transparent 23rem),
        radial-gradient(circle at 15% 20%, rgba(31, 157, 97, 0.08), transparent 18rem),
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px),
        #f6f9fd;
      background-size: auto, auto, 48px 48px, 48px 48px, auto;
    }

    .loader-wrapper {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.42), rgba(255, 255, 255, 0.72)),
        radial-gradient(circle at 50% 42%, rgba(11, 104, 199, 0.1), transparent 22rem);
      transition: opacity 0.5s ease;
    }

    .loader-panel {
      width: min(420px, 100%);
      display: grid;
      justify-items: center;
      gap: 24px;
      padding: 36px 34px 32px;
      border: 1px solid rgba(9, 47, 92, 0.12);
      border-radius: 18px;
      background: var(--panel);
      box-shadow:
        0 24px 80px var(--shadow),
        0 1px 0 rgba(255, 255, 255, 0.9) inset;
      backdrop-filter: blur(18px);
    }

    .loader-brand {
      display: block;
      width: 168px;
      height: auto;
    }

    .loader {
      position: relative;
      width: 138px;
      height: 138px;
      display: grid;
      place-items: center;
      filter: drop-shadow(0 18px 30px rgba(9, 47, 92, 0.16));
    }

    .loader::before {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: 50%;
      background:
        linear-gradient(rgba(11, 104, 199, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(11, 104, 199, 0.08) 1px, transparent 1px);
      background-size: 18px 18px;
      box-shadow: inset 0 0 0 1px rgba(11, 104, 199, 0.12);
    }

    .loader-square {
      position: absolute;
      border-radius: 7px;
      box-shadow: 0 12px 24px rgba(9, 32, 64, 0.16);
      animation: squareOrbit 2.7s cubic-bezier(0.64, 0, 0.36, 1) infinite;
    }

    .loader-square.red {
      width: 62px;
      height: 62px;
      border: 3px solid var(--red);
      animation-duration: 3.2s;
    }

    .loader-square.green {
      width: 44px;
      height: 44px;
      border: 3px solid var(--green);
      animation-duration: 2.5s;
      animation-direction: reverse;
    }

    .loader-square.blue {
      width: 22px;
      height: 22px;
      background: var(--blue);
      animation: squarePulse 1.35s ease-in-out infinite;
    }

    .loader-copy {
      display: grid;
      gap: 8px;
      text-align: center;
    }

    .loader-text {
      margin: 0;
      color: var(--ink);
      font-size: clamp(26px, 4.6vw, 36px);
      font-weight: 850;
      line-height: 1.04;
      letter-spacing: -0.025em;
      text-wrap: balance;
    }

    .loader-subtext {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 650;
      line-height: 1.5;
    }

    .progress {
      width: min(300px, 100%);
      display: grid;
      gap: 10px;
    }

    .progress-track {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: var(--blue-soft);
      box-shadow: inset 0 0 0 1px rgba(11, 104, 199, 0.08);
    }

    .progress-fill {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--red), var(--green), var(--blue));
      transform: scaleX(0);
      transform-origin: left center;
      animation: progressFill 2.8s cubic-bezier(0.18, 0.82, 0.26, 1) forwards;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      color: #7a8798;
      font-size: 11px;
      font-weight: 750;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    @keyframes squareOrbit {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes squarePulse {
      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.18);
      }
    }

    @keyframes progressFill {
      0% {
        transform: scaleX(0.08);
      }

      42% {
        transform: scaleX(0.58);
      }

      72% {
        transform: scaleX(0.82);
      }

      100% {
        transform: scaleX(0.96);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }

      .progress-fill {
        transform: scaleX(0.92);
      }
    }

    @media (max-width: 520px) {
      .loader-panel {
        padding: 30px 24px 28px;
        border-radius: 16px;
      }

      .loader {
        width: 124px;
        height: 124px;
      }

      .loader-text {
        font-size: 25px;
      }
    }
  </style>
</head>
<body>
  <div id="loader-wrapper" class="loader-wrapper">
    <section class="loader-panel" aria-label="Loading Global Map">
      <img class="loader-brand" src="public/navlogo-dark.png" alt="6D Address">

      <div class="loader" aria-hidden="true">
        <span class="loader-square red"></span>
        <span class="loader-square green"></span>
        <span class="loader-square blue"></span>
      </div>

      <div class="loader-copy">
        <h1 class="loader-text">Loading Global Map</h1>
        <p class="loader-subtext">Preparing map tiles, grid references, and location tools.</p>
      </div>

      <div class="progress" aria-hidden="true">
        <span class="progress-track"><span class="progress-fill"></span></span>
        <span class="progress-meta">
          <span>Syncing</span>
          <span>Global map</span>
        </span>
      </div>
    </section>
  </div>
</body>
</html>
